<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body { font-family: -apple-system, sans-serif; background: #14100c; color: #f4ecde; padding: 20px; max-width: 480px; margin: 0 auto; font-size: 14px; }
  h2 { font-size: 16px; margin: 0 0 14px; color: #fff; }
  label { display: block; padding: 8px 0; }
  input[type=range] { width: 100%; }
  input[type=checkbox] { margin-right: 8px; }
  select { background: #1c1812; color: #f4ecde; border: 1px solid #2a2218; padding: 4px 8px; border-radius: 4px; }
  .meta { color: #8a8270; font-size: 11px; margin-top: 4px; }
  button { background: #8fd694; color: #14100c; border: 0; padding: 6px 14px; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 12px; }
</style></head><body>
  <h2>Pronounce — settings</h2>
  <label><input type="checkbox" id="enabled"> Enable on every page</label>
  <label>Trigger mode:
    <select id="mode">
      <option value="click">click on a known word</option>
      <option value="modclick">Alt/⌘ + click only</option>
    </select>
    <div class="meta">Click mode: plain click on a known dictionary word shows the popup. Mod-click avoids accidental clicks.</div>
  </label>
  <label>Speech rate: <span id="rateLbl"></span>
    <input type="range" id="rate" min="0.6" max="1.4" step="0.05">
  </label>
  <button id="save">Save</button>
  <script src="options.js"></script>
</body></html>

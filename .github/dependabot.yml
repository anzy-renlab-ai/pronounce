version: 2
updates:
  # Keep GitHub Actions pinned-SHA references current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # VS Code extension dependencies.
  - package-ecosystem: "npm"
    directory: "/integrations/vscode"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(ext)"

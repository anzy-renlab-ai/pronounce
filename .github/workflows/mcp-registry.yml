name: Publish MCP server (GHCR + official registry)

on:
  workflow_dispatch:
  push:
    tags:
      - "mcp-v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # server.json's oci identifier is the single source of truth for the
      # image tag — deriving it here keeps the registry entry and the pushed
      # image in lockstep (a mismatch publishes a registry entry pointing at
      # an image tag that was never built).
      - name: Derive version from server.json
        id: ver
        run: echo "version=$(jq -r .version mcp-server/server.json)" >> "$GITHUB_OUTPUT"

      - name: Check server.json package identifiers match the version
        run: |
          v="${{ steps.ver.outputs.version }}"
          # Select by registryType, not by array index — the PyPI package is listed
          # first now, and a positional check silently breaks the moment the order
          # changes (it did).
          jq -e --arg t "ghcr.io/anzy-renlab-ai/pronounce-mcp:$v" \
            'any(.packages[]; .registryType == "oci" and .identifier == $t)' \
            mcp-server/server.json
          jq -e --arg v "$v" \
            'any(.packages[]; .registryType == "pypi" and .identifier == "pronounce-mcp" and .version == $v)' \
            mcp-server/server.json

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: mcp-server
          push: true
          tags: |
            ghcr.io/anzy-renlab-ai/pronounce-mcp:${{ steps.ver.outputs.version }}
            ghcr.io/anzy-renlab-ai/pronounce-mcp:latest
          labels: |
            io.modelcontextprotocol.server.name=io.github.anzy-renlab-ai/pronounce
            org.opencontainers.image.source=https://github.com/anzy-renlab-ai/pronounce
            org.opencontainers.image.description=Pronounce MCP server — developer-jargon pronunciation dictionary
            org.opencontainers.image.licenses=MIT

      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Publish to official MCP registry (GitHub OIDC)
        working-directory: mcp-server
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish

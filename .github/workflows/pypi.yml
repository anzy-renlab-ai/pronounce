name: Publish pronounce-mcp to PyPI

# Uses PyPI Trusted Publishing (OIDC) — no token stored anywhere.
# One-time setup on pypi.org (account → Publishing → "Add a new pending publisher"):
#   PyPI project name : pronounce-mcp
#   Owner             : anzy-renlab-ai
#   Repository        : pronounce
#   Workflow          : pypi.yml
#   Environment       : pypi
# After that, dispatch this workflow (or push a pypi-v* tag) and the package publishes.

on:
  workflow_dispatch:
  push:
    tags:
      - "pypi-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build mcp-server

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: mcp-server/dist

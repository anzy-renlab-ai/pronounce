name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'bin/say-it'
      - 'data/pronunciations.tsv'
      - 'tools/lint-dict.sh'
      - 'tools/smoke-test.sh'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint dictionary format
        run: bash tools/lint-dict.sh

  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: CLI smoke test
        run: bash tools/smoke-test.sh

name: Build site

on:
  push:
    branches: [main]
    paths:
      - 'data/pronunciations.tsv'
      - 'tools/build-site.sh'
      - 'tools/make-og.py'
      - 'tools/make-og-all.py'
      - '.github/workflows/build-site.yml'
  workflow_dispatch:

concurrency:
  group: build-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow

      - name: Install ffmpeg (for audio rendering)
        run: brew install ffmpeg

      - name: Build static site
        run: bash tools/build-site.sh

      - name: Render per-word audio (macOS `say` → mp3; idempotent, fills only new words)
        run: python3 tools/make-audio-all.py

      - name: Regenerate global OG card (docs/og.png — keeps "and N more." in sync with dict)
        run: python3 tools/make-og.py

      - name: Regenerate per-word OG images
        run: python3 tools/make-og-all.py

      - name: Detect changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain docs/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "build: regenerate site (auto)" -m "Triggered by ${{ github.event.head_commit.id }}"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || sleep 5
          done

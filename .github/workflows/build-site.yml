name: Build site

on:
  push:
    branches: [main]
    paths:
      - 'data/pronunciations.tsv'
      - 'tools/build-site.sh'
      - 'tools/make-og-all.py'
      - '.github/workflows/build-site.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow

      - name: Build static site
        run: bash tools/build-site.sh

      - name: Regenerate per-word OG images
        run: python3 tools/make-og-all.py

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet docs/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "build: regenerate site (auto)" -m "Triggered by ${{ github.event.head_commit.id }}"
          git push
